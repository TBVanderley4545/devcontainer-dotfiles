- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.config/nvim:
      path: nvim
      create: true
    ~/.ripgreprc:
    ~/.tmux.conf: tmux
    ~/.zsh:
    ~/.zshrc:

- shell:
    - command: ./nvm-installer
      stdout: true
    - command: ./sdkman-installer
      stdout: true
